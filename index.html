<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八卦翻牌点名</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'LiSu', '隶书', cursive;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
        }

        .card {
            width: 80vw;
            height: 70vh;
            max-width: 400px;
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .front {
            background: #8b1a1a;
            transform: rotateY(0deg);
        }

        .back {
            background: #0d2137;
            transform: rotateY(180deg);
            writing-mode: vertical-rl;
        }

        .symbol {
            font-size: 9rem;
            color: #FFD700;
            margin-bottom: 10px;
        }

        .gua-name {
            font-size: 7rem;
            color: #FFD700;
        }

        .name {
            font-family: 'KaiTi', '楷体', cursive;
            color: white;
            font-size: 8rem;
            text-align: center;
        }

        #firework {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" onclick="flipCard(this)">
            <div class="card-inner">
                <div class="card-face front"></div>
                <div class="card-face back"></div>
            </div>
        </div>
        <div class="card" onclick="flipCard(this)">
            <div class="card-inner">
                <div class="card-face front"></div>
                <div class="card-face back"></div>
            </div>
        </div>
    </div>
    <canvas id="firework"></canvas>

    <script>
        const names = ["刘鑫朵","赵梓雅","张佳媛","牛欣怡","梁雨荨","汤智捷","路凤仪","李思音",
        "杨玉言","韩格格","吴晔含","张梦圆","杨思涵","何思诺","宋鑫怡","张梦涵","李依诺","宋依诺",
        "郭欣尧","黄淳悦","奚悦鑫","代佳展","李梦瑶","王嘉玥","武嘉怡","栗梦佳","刘芊妤","杨煜瑶","申奕萱",
        "刘伊诺","刘雪辰","杨小丫","张雅欣","胡婕钰","冯子菱","程汉蓝","马睿言","王麒棪","李岚宇","申童锦",
        "张浩天","高旭阳","步明翰","魏凡哲","乔桢彭","郑泽浩","李昀泽","高靖博","史政阳","石天琪","郑东珅","栗逸轩","李思洋"];

        const guas = [
            {symbol: "☰", name: "乾"}, {symbol: "☱", name: "兑"},
            {symbol: "☲", name: "离"}, {symbol: "☳", name: "震"},
            {symbol: "☴", name: "巽"}, {symbol: "☵", name: "坎"},
            {symbol: "☶", name: "艮"}, {symbol: "☷", name: "坤"}
        ];

        let usedGuas = [];
        let usedNames = [];  // 新增：追踪已抽取的人名
        
        function getRandomGuas() {
            if(usedGuas.length >= guas.length) usedGuas = [];
            const available = guas.filter(g => !usedGuas.includes(g));
            const selected = [];
            while(selected.length < 2 && available.length > 0) {
                const index = Math.floor(Math.random() * available.length);
                selected.push(available.splice(index, 1)[0]);
            }
            usedGuas.push(...selected);
            return selected;
        }

        function updateGuas() {
            const guaPair = getRandomGuas();
            document.querySelectorAll('.front').forEach((front, index) => {
                front.innerHTML = `
                    <div class="symbol">${guaPair[index].symbol}</div>
                    <div class="gua-name">${guaPair[index].name}</div>
                `;
            });
        }

        function flipCard(card) {
            if(card.classList.contains('flipped')) return;
            
            // 当所有人名都被抽过一遍时，自动重置名单
            if(usedNames.length >= names.length) {
                usedNames = [];
            }
            
            // 筛选出还没被抽过的人名
            const availableNames = names.filter(name => !usedNames.includes(name));
            
            // 从可用名单中随机抽取一个
            const randomIndex = Math.floor(Math.random() * availableNames.length);
            const selectedName = availableNames[randomIndex];
            
            // 将抽中的人名记录到已用名单中
            usedNames.push(selectedName);
            
            const back = card.querySelector('.back');
            back.innerHTML = `<div class="name">${selectedName}</div>`;
            
            card.classList.add('flipped');
            createFirework();
            
            setTimeout(() => {
                card.classList.remove('flipped');
                updateGuas();
            }, 20000);
        }

        // 烟花效果实现
        const canvas = document.getElementById('firework');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createFirework() {
            particles = [];
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
            
            for(let i = 0; i < 100; i++) {
                particles.push({
                    x: canvas.width/2,
                    y: canvas.height/2,
                    color: colors[Math.floor(Math.random()*colors.length)],
                    radius: Math.random() * 3 + 1,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    alpha: 1
                });
            }

            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.01;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.fill();
                
                if(p.alpha <= 0) {
                    particles.splice(index, 1);
                }
            });

            if(particles.length > 0) {
                requestAnimationFrame(animate);
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        updateGuas();
    </script>
</body>
</html>
